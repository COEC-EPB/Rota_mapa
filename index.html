<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Despacho LL</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }

#login {
  height:100vh; display:flex; justify-content:center; align-items:center;
}

.card {
  background:#1e293b; padding:30px; border-radius:12px; width:300px;
}

input, button {
  width:100%; margin-top:10px; padding:10px; border-radius:8px; border:none;
}

button { background:#22c55e; color:white; cursor:pointer; }

#app { display:none; }

#admin {
  padding:10px;
  background:#020617;
}

#status {
  margin-top:10px;
  padding:8px;
  border-radius:6px;
}

.processando { background:#facc15; color:black; }
.sucesso { background:#22c55e; }
.erro { background:#ef4444; }

#map { height:calc(100vh - 160px); }
</style>

</head>

<body>

<!-- LOGIN -->

<div id="login">
  <div class="card">
    <h3>Login</h3>
    <input id="user" placeholder="Usuário">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->

<div id="app">

  <div id="admin">
    <input type="file" id="file1">
    <input type="file" id="file2">
    <button onclick="processar()">Processar</button>
    <div id="progressContainer" style="margin-top:10px; display:none;">
  <div style="background:#1e293b; border-radius:8px; overflow:hidden;">
    <div id="progressBar" style="
      width:0%;
      height:20px;
      background:#22c55e;
      text-align:center;
      color:white;
      font-size:12px;
    ">0%</div>
  </div>
</div>
    <div id="status"></div>
  </div>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<script>
let map, layer;

/* LOGIN */
function login() {
  const user = document.getElementById("user").value;
  const senha = document.getElementById("senha").value;

  if (user === "admin" && senha === "123456") {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

    initMap();
    carregar();
  } else {
    alert("Login inválido");
  }
}
  function atualizarBarra(percent) {
  const bar = document.getElementById("progressBar");
  bar.style.width = percent + "%";
  bar.innerText = percent + "%";
}

/* MAPA */
function initMap() {
  map = L.map('map').setView([-7.12, -36.5], 8);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png')
    .addTo(map);

  layer = L.layerGroup().addTo(map);
}

/* CARREGAR DADOS */
async function carregar() {
  const res = await fetch("https://despacholinhaviva.pedro-fillype.workers.dev/api/dados");
  const dados = await res.json();

  layer.clearLayers();

  dados.forEach(p => {
    if (!p.lat || !p.lon) return;

    L.circleMarker([p.lat, p.lon], {
      radius: 8,
      fillColor: corPorTipo(p.tipo),
      color: "#fff",
      weight: 1,
      fillOpacity: 0.9
    })
        <b>OS:</b> ${p.os}<br>
        <b>Status:</b> ${p.status}<br>
        <b>Data:</b> ${p.data_criacao || "-"}<br>
        <b>Alimentador:</b> ${p.alimentador || "-"}<br>
        <b>Tipo:</b> ${p.tipo || "-"}<br>
        <b>Tag:</b> ${p.tag || "-"}
        <b>Criticidade:</b> ${p.Criticidade || "-"}        
      .addTo(layer);
  });
}
function corPorTipo(tipo) {
  if (!tipo) return "#94a3b8";

  tipo = tipo.toUpperCase();

  if (tipo.includes("PREVENTIVA")) return "#22c55e"; // verde
  if (tipo.includes("CORRETIVA")) return "#ef4444"; // vermelho
  if (tipo.includes("INSPECAO")) return "#3b82f6"; // azul

  return "#facc15"; // amarelo padrão
}
/* PROCESSAR EXCEL */
async function processar() {
  const f1 = file1.files[0];
  const f2 = file2.files[0];
  const status = document.getElementById("status");
  const progressContainer = document.getElementById("progressContainer");

  if (!f1 || !f2) {
    alert("Envie os dois arquivos");
    return;
  }

  status.innerText = "⏳ Processando...";
  status.className = "processando";
  progressContainer.style.display = "block";
  atualizarBarra(5);

  try {
    // 📄 LEITURA
    const wb1 = XLSX.read(await f1.arrayBuffer());
    const data1 = XLSX.utils.sheet_to_json(
      wb1.Sheets[wb1.SheetNames[0]]
    );

    atualizarBarra(20);

    const wb2 = XLSX.read(await f2.arrayBuffer());
    const data2 = XLSX.utils.sheet_to_json(
      wb2.Sheets[wb2.SheetNames[0]]
    );

    atualizarBarra(40);

    let dados = [...data1, ...data2];

    // 🔍 FILTRO
    dados = dados.filter(r =>
      r.Status === "CRIADA" || r.Status === "A REPROGRAMAR"
    );

    atualizarBarra(60);

    // 🔄 TRANSFORMAÇÃO
    dados = dados.map(r => ({
      os: r["OS Manutencao"] || r["OS Manutenção"] || "",
      status: r["Status"] || "",
      data_criacao: r["Data Criacao"] || "",
      base: r["Base Operacao"] || "",
      qtd_clientes: r["Qtd Clientes Cadastrados"] || 0,
      alimentador: r["Nome do Alimentador"] || "",
      lat: parseFloat(String(r["Latitude"] || "0").replace(",", ".")),
      lon: parseFloat(String(r["Longitude"] || "0").replace(",", ".")),
      trecho: r["Trecho"] || "",
      tag: r["Tag Ativo"] || "",
      criticidade: r["Criticidade"] || "",
      tipo: r["Tipo Manutencao"] || ""
    }));

    atualizarBarra(80);

    const chunkSize = 300;

    for (let i = 0; i < dados.length; i += chunkSize) {
      const chunk = dados.slice(i, i + chunkSize);
    
      const res = await fetch("https://despacholinhaviva.pedro-fillype.workers.dev/salvar", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-reset": i === 0 ? "true" : "false"
        },
        body: JSON.stringify(chunk)
      });
    
      if (!res.ok) {
        throw new Error(await res.text());
      }
    
      // 🔄 atualiza progresso real
      const progresso = Math.floor((i + chunk.length) / dados.length * 100);
      atualizarBarra(progresso);
    }

    atualizarBarra(100);

    status.innerText = `✅ Processamento completo (${dados.length} registros)`;
    status.className = "sucesso";

    carregar();

  } catch (e) {
    console.error(e);
    status.innerText = "❌ Erro no processamento";
    status.className = "erro";
    atualizarBarra(0);
  }
}
</script>

</body>
</html>
