<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Despacho LL PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>
body { margin:0; font-family:Arial; background:#0b1220; color:white; }

/* LOGIN */
#login {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.card {
  background:#1e293b;
  padding:30px;
  border-radius:12px;
  width:300px;
}

/* APP */
#app { display:none; }

/* HEADER */
#header {
  height:50px;
  background:#020617;
  display:flex;
  align-items:center;
  padding:0 20px;
  font-weight:bold;
}

/* LAYOUT */
#layout {
  display:flex;
  height:calc(100vh - 50px);
}

/* SIDEBAR */
#sidebar {
  width:300px;
  background:#020617;
  padding:20px;
  overflow:auto;
}

/* MAP */
#map { flex:1; }

/* INPUT */
input, select, button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:none;
  background:#1e293b;
  color:white;
  font-size:14px;
}

button { background:#22c55e; cursor:pointer; font-weight:bold; }
.logout { background:#ef4444; margin-top:20px; }

/* LABEL */
.label {
  margin-top:12px;
  font-size:12px;
  color:#94a3b8;
}

/* PROGRESS */
#progress { margin-top:10px; background:#111827; border-radius:8px; }
#bar {
  height:20px;
  width:0%;
  background:#22c55e;
  text-align:center;
  font-size:12px;
}

/* CLUSTER */
.cluster div {
  border-radius:50%;
  color:white;
  font-weight:bold;
  text-align:center;
  line-height:40px;
}
.cluster-small { background:#22c55e; }
.cluster-medium { background:#facc15; }
.cluster-large { background:#ef4444; }

</style>

</head>

<body>

<!-- LOGIN -->

<div id="login">
  <div class="card">
    <h3>🔐 Login</h3>
    <input id="user" placeholder="Usuário">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->

<div id="app">

<div id="header">📍 Despacho LL</div>

<div id="layout">

<div id="sidebar">

<h3>📁 Upload</h3>
<input type="file" id="file">
<button onclick="enviar()">Enviar</button>

<div id="progress"><div id="bar">0%</div></div>
<div id="status"></div>

<hr>

<h3>📊 Filtros</h3>

<div class="label">Buscar OS</div>
<input id="busca" placeholder="Digite a OS..." oninput="carregar()">

<div class="label">Criticidade</div>
<select id="crit" onchange="carregar()">
  <option value="">Todas</option>
  <option value="ALTA">Alta</option>
  <option value="MEDIA">Média</option>
  <option value="BAIXA">Baixa</option>
</select>

<div class="label">Tipo de Serviço</div>
<select id="tipo" onchange="carregar()"></select>

<div class="label">Trecho</div>
<select id="trecho" onchange="carregar()"></select>

<div class="label">Alimentador</div>
<select id="alim" onchange="carregar()"></select>

<div id="contador"></div>

<button class="logout" onclick="logout()">Sair</button>

</div>

<div id="map"></div>

</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
let map, cluster;
let coresTipo = {};
let paleta = ["#3b82f6","#22c55e","#facc15","#ef4444","#a855f7","#06b6d4","#f97316"];

/* LOGIN */
function login(){
  if(user.value==="admin" && senha.value==="123456"){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    init();
    carregar();
  } else alert("Login inválido");
}
function logout(){ location.reload(); }

/* MAP */
function init(){
  map = L.map('map').setView([-7.12,-36.5],8);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

  cluster = L.markerClusterGroup({
  maxClusterRadius: z => z < 8 ? 80 : z < 12 ? 50 : 20,
  disableClusteringAtZoom: 14,
  chunkedLoading: true,

  iconCreateFunction: function (cluster) {
    const count = cluster.getChildCount();

    return L.divIcon({
      html: `<div style="
        background:#1e293b;
        color:white;
        border-radius:50%;
        width:40px;
        height:40px;
        display:flex;
        align-items:center;
        justify-content:center;
        font-weight:bold;
      ">${count}</div>`,
      className: "cluster",
      iconSize: L.point(40, 40)
    });
  }
});
let legendaControl = null;
  map.addLayer(cluster);
}
function atualizarLegenda(){

  if (legendaControl) {
    map.removeControl(legendaControl);
  }

  legendaControl = L.control({position:"bottomright"});

  legendaControl.onAdd = function(){
    const div = L.DomUtil.create("div");

    div.style.background="#020617";
    div.style.padding="10px";
    div.style.borderRadius="8px";
    div.style.maxHeight="200px";
    div.style.overflowY="auto";

    let html="<b>Tipos</b><br>";

    Object.entries(coresTipo).forEach(([t,c])=>{
      html+=`
        <div style="margin-top:4px;">
          <span style="
            background:${c};
            width:10px;
            height:10px;
            display:inline-block;
            margin-right:6px
          "></span>
          ${t}
        </div>`;
    });

    div.innerHTML=html;
    return div;
  };

  legendaControl.addTo(map);
}
/* COR POR TIPO */
function corTipo(tipo){
  if(!tipo) return "#94a3b8";
  if(!coresTipo[tipo]){
    coresTipo[tipo] = paleta[Object.keys(coresTipo).length % paleta.length];
  }
  return coresTipo[tipo];
}

/* LEGENDA */
function legenda(){
  const l = L.control({position:"bottomright"});

  l.onAdd=function(){
    const div = L.DomUtil.create("div");
    div.style.background="#020617";
    div.style.padding="10px";
    div.style.borderRadius="8px";

    let html="<b>Tipos</b><br>";
    Object.entries(coresTipo).forEach(([t,c])=>{
      html+=`<div><span style="background:${c};width:10px;height:10px;display:inline-block;margin-right:5px"></span>${t}</div>`;
    });

    div.innerHTML=html;
    return div;
  };

  l.addTo(map);
}

/* UPLOAD */
function enviar(){
  const file = document.getElementById("file").files[0];
  if(!file) return alert("Selecione arquivo");

  const reader = new FileReader();

  reader.onload = e=>{
    const wb = XLSX.read(new Uint8Array(e.target.result),{type:"array"});
    const csv = XLSX.utils.sheet_to_csv(wb.Sheets[wb.SheetNames[0]]);

    const xhr = new XMLHttpRequest();
    xhr.open("POST","https://despacholinhaviva.pedro-fillype.workers.dev/upload");

    xhr.upload.onprogress = e=>{
      if(e.lengthComputable){
        const p = Math.round((e.loaded/e.total)*100);
        bar.style.width=p+"%";
        bar.innerText=p+"%";
      }
    };

    xhr.onload=()=>{ status.innerText="Upload OK"; carregar(); };
    xhr.send(csv);
  };

  reader.readAsArrayBuffer(file);
}

/* FILTROS */
function preencher(id,set){
  const el=document.getElementById(id);
  el.innerHTML='<option value="">Todos</option>';
  [...set].sort().forEach(v=> el.innerHTML+=`<option>${v}</option>`);
}

/* CARREGAR */
async function carregar(){
  const res = await fetch("https://despacholinhaviva.pedro-fillype.workers.dev/api/dados");
  let dados = await res.json();

  const busca = document.getElementById("busca").value.toUpperCase();
  const crit = document.getElementById("crit").value;
  const tipo = document.getElementById("tipo").value;
  const trecho = document.getElementById("trecho").value;
  const alim = document.getElementById("alim").value;

  const setTipo=new Set(), setTrecho=new Set(), setAlim=new Set();

  dados.forEach(p=>{
    if(p.tipo) setTipo.add(p.tipo);
    if(p.trecho) setTrecho.add(p.trecho);
    if(p.alimentador) setAlim.add(p.alimentador);
  });

  preencher("tipo",setTipo);
  preencher("trecho",setTrecho);
  preencher("alim",setAlim);

  coresTipo = {};
  cluster.clearLayers();

  dados = dados.filter(p=>{
    if(busca && !p.os?.toUpperCase().includes(busca)) return false;
    if(crit && !p.criticidade?.includes(crit)) return false;
    if(tipo && p.tipo!==tipo) return false;
    if(trecho && p.trecho!==trecho) return false;
    if(alim && p.alimentador!==alim) return false;
    return true;
  });

  contador.innerText="Total: "+dados.length;

  dados.forEach(p=>{
    const marker = L.marker([p.lat, p.lon], {
  icon: L.divIcon({
    className: "custom-marker",
    html: `<div style="
      width:12px;
      height:12px;
      background:${corTipo(p.tipo)};
      border-radius:50%;
      border:2px solid white;
    "></div>`
  })
});

    marker.bindPopup(`
      <b>OS:</b> ${p.os}<br>
      <b>Status:</b> ${p.status}<br>
      <b>Tipo:</b> ${p.tipo}<br>
      <b>Trecho:</b> ${p.trecho}<br>
      <b>Alimentador:</b> ${p.alimentador}<br>
      <b>Criticidade:</b> ${p.criticidade}<br>
      <b>Tag:</b> ${p.tag}
    `);

    cluster.addLayer(marker);
  });
  legenda();
  atualizarLegenda();
}
</script>

</body>
</html>
