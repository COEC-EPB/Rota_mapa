<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Mapa de Serviços</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}
#topo {
  padding: 10px;
  background: white;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
#map {
  height: calc(100vh - 60px);
}
.btn {
  background: #1a73e8;
  color: white;
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="topo">
  <h3>Mapa de Serviços</h3>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
let map, layersGroup;
let dadosOriginais = [];

function initMap() {
  map = L.map('map').setView([-7.12, -36.5], 8);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    maxZoom: 20
  }).addTo(map);

  layersGroup = L.layerGroup().addTo(map);
}

async function carregarDadosBackend() {
  try {
    const res = await fetch("https://despacholinhaviva.pedro-fillype.workers.dev/api/dados");

    if (!res.ok) {
      const txt = await res.text();
      console.error(txt);
      alert("Erro ao buscar dados");
      return;
    }

    const json = await res.json();

    console.log("Dados recebidos:", json);

    dadosOriginais = json.map(r => ({
      lat: parseFloat(r.lat),
      lon: parseFloat(r.lon),
      os: r.os || "",
      status: r.status || "",
      base: r.base || "SEM BASE",
      tipo: r.tipo || ""
    }))
    .filter(r => !isNaN(r.lat) && !isNaN(r.lon));

    if (dadosOriginais.length === 0) {
      alert("Nenhum ponto válido encontrado");
      return;
    }

    desenharMapa();

  } catch (e) {
    console.error(e);
    alert("Erro ao conectar com servidor");
  }
}
function desenharMapa() {
  layersGroup.clearLayers();

  let coords = [];

  dadosOriginais.forEach((ponto, i) => {

    const marker = L.circleMarker([ponto.lat, ponto.lon], {
      radius: 10,
      fillColor: "#1a73e8",
      color: "#fff",
      weight: 2,
      fillOpacity: 0.9
    });

    marker.bindPopup(`
      <b>OS:</b> ${ponto.os}<br>
      <b>Status:</b> ${ponto.status}<br>
      <b>Base:</b> ${ponto.base}<br>
      <b>Tipo:</b> ${ponto.tipo}
    `);

    marker.addTo(layersGroup);
    coords.push([ponto.lat, ponto.lon]);
  });

  if (coords.length > 0) {
    map.fitBounds(coords);
  }
}

initMap();
carregarDadosBackend();
</script>

</body>
</html>
