<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Despacho LL PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>
body { margin:0; font-family:Arial; background:#0b1220; color:white; }

/* LOGIN */
#login {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.card {
  background:#1e293b;
  padding:30px;
  border-radius:12px;
  width:300px;
}

/* APP */
#app { display:none; }

/* HEADER */
#header {
  height:50px;
  background:#020617;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}

/* LAYOUT */
#layout {
  display:flex;
  height:calc(100vh - 50px);
}

/* SIDEBAR */
#sidebar {
  width:300px;
  background:#020617;
  padding:20px;
  transition:0.3s;
  overflow:auto;
}
#sidebar.collapsed {
  width:60px;
  padding:10px;
}

/* BOTÃO TOGGLE */
#toggle {
  background:#1e293b;
  border:none;
  padding:8px;
  cursor:pointer;
  width:100%;
}

/* MAP */
#map { flex:1; }

/* INPUT */
input, select, button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  background:#1e293b;
  color:white;
}

button { background:#22c55e; cursor:pointer; }
.logout { background:#ef4444; margin-top:20px; }

/* PROGRESS */
#progress { margin-top:10px; background:#111827; border-radius:8px; }
#bar {
  height:20px;
  width:0%;
  background:#22c55e;
  text-align:center;
  font-size:12px;
}

/* CLUSTER */
.cluster div {
  border-radius:50%;
  color:white;
  font-weight:bold;
  text-align:center;
  line-height:40px;
}
.cluster-small { background:#22c55e; }
.cluster-medium { background:#facc15; }
.cluster-large { background:#ef4444; }

</style>

</head>

<body>

<!-- LOGIN -->

<div id="login">
  <div class="card">
    <h3>🔐 Login</h3>
    <input id="user" placeholder="Usuário">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->

<div id="app">

<div id="header">
  <div>📍 Despacho LL</div>
</div>

<div id="layout">

<div id="sidebar">

<button id="toggle" onclick="toggleSidebar()">☰</button>

<h3>📁 Upload</h3>
<input type="file" id="file">
<button onclick="enviar()">Enviar</button>

<div id="progress"><div id="bar">0%</div></div>
<div id="status"></div>

<hr>

<h3>📊 Filtros</h3>

<input id="busca" placeholder="Buscar OS..." oninput="carregar()">

<select id="crit" onchange="carregar()">
<option value="">Criticidade</option>
<option value="ALTA">Alta</option>
<option value="MEDIA">Média</option>
<option value="BAIXA">Baixa</option>
</select>

<select id="tipo" onchange="carregar()"></select> <select id="trecho" onchange="carregar()"></select> <select id="alim" onchange="carregar()"></select>

<div id="contador"></div>

<button class="logout" onclick="logout()">Sair</button>

</div>

<div id="map"></div>

</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
let map, cluster;

/* LOGIN */
function login(){
  const user = document.getElementById("user").value;
  const senha = document.getElementById("senha").value;

  if(user === "admin" && senha === "123456"){

    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

    init();
    carregar();

  } else {
    alert("Login inválido");
  }
}
function logout(){ location.reload(); }

/* SIDEBAR */
function toggleSidebar(){
  sidebar.classList.toggle("collapsed");
}

/* MAPA */
function init(){
  map = L.map('map').setView([-7.12,-36.5],8);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

  // 🔥 CLUSTER INTELIGENTE
  cluster = L.markerClusterGroup({
    maxClusterRadius: zoom => zoom<8?80:zoom<12?50:20,
    disableClusteringAtZoom:14,
    spiderfyOnMaxZoom:true,
    showCoverageOnHover:false,
    chunkedLoading:true,

    iconCreateFunction: function(c){
      const count = c.getChildCount();
      let size="small";
      if(count>50) size="large";
      else if(count>20) size="medium";

      return L.divIcon({
        html:`<div class="cluster-${size}">${count}</div>`,
        className:"cluster",
        iconSize:L.point(40,40)
      });
    }
  });

  map.addLayer(cluster);
}

/* CORES */
function cor(c){
  if(!c) return "#94a3b8";
  c=c.toUpperCase();
  if(c.includes("ALTA")) return "#ef4444";
  if(c.includes("MEDIA")) return "#facc15";
  if(c.includes("BAIXA")) return "#22c55e";
  return "#3b82f6";
}

/* UPLOAD */
async function enviar(){
  const file = document.getElementById("file").files[0];
  if(!file) return alert("Selecione arquivo");

  const reader = new FileReader();

  reader.onload = e=>{
    const wb = XLSX.read(new Uint8Array(e.target.result),{type:"array"});
    const csv = XLSX.utils.sheet_to_csv(wb.Sheets[wb.SheetNames[0]]);

    const xhr = new XMLHttpRequest();
    xhr.open("POST","https://despacholinhaviva.pedro-fillype.workers.dev/upload");

    xhr.upload.onprogress = e=>{
      if(e.lengthComputable){
        const p = Math.round((e.loaded/e.total)*100);
        bar.style.width=p+"%";
        bar.innerText=p+"%";
      }
    };

    xhr.onload=()=>{ status.innerText="Upload OK"; carregar(); };

    xhr.send(csv);
  };

  reader.readAsArrayBuffer(file);
}

/* FILTROS DINÂMICOS */
function preencher(id,set){
  const el=document.getElementById(id);
  el.innerHTML='<option value="">Todos</option>';
  [...set].sort().forEach(v=>{
    el.innerHTML+=`<option>${v}</option>`;
  });
}

/* CARREGAR */
async function carregar(){
  const res = await fetch("https://despacholinhaviva.pedro-fillype.workers.dev/api/dados");
  let dados = await res.json();

  const busca = document.getElementById("busca").value.toUpperCase();
  const crit = document.getElementById("crit").value;
  const tipo = document.getElementById("tipo").value;
  const trecho = document.getElementById("trecho").value;
  const alim = document.getElementById("alim").value;

  const setTipo=new Set(), setTrecho=new Set(), setAlim=new Set();

  dados.forEach(p=>{
    if(p.tipo) setTipo.add(p.tipo);
    if(p.trecho) setTrecho.add(p.trecho);
    if(p.alimentador) setAlim.add(p.alimentador);
  });

  preencher("tipo",setTipo);
  preencher("trecho",setTrecho);
  preencher("alim",setAlim);

  cluster.clearLayers();

  dados = dados.filter(p=>{
    if(busca && !p.os?.toUpperCase().includes(busca)) return false;
    if(crit && !p.criticidade?.includes(crit)) return false;
    if(tipo && p.tipo!==tipo) return false;
    if(trecho && p.trecho!==trecho) return false;
    if(alim && p.alimentador!==alim) return false;
    return true;
  });

  contador.innerText="Total: "+dados.length;

  dados.forEach(p=>{
    const marker = L.circleMarker([p.lat,p.lon],{
      radius:8,
      fillColor:cor(p.criticidade),
      color:"#fff",
      fillOpacity:0.9
    });

    marker.bindPopup(`
      <b>OS:</b> ${p.os}<br>
      <b>Status:</b> ${p.status}<br>
      <b>Tipo:</b> ${p.tipo}<br>
      <b>Trecho:</b> ${p.trecho}<br>
      <b>Alimentador:</b> ${p.alimentador}
    `);

    cluster.addLayer(marker);
  });
}
</script>

</body>
</html>
