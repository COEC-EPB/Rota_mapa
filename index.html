<style>

<body>

</div>

</div>

  <div class="box">

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>
let map, cluster;

/* LOGIN */
function loginSistema(){
  const user = document.getElementById("user").value;
  const senha = document.getElementById("senha").value;

  if(user === "admin" && senha === "123456"){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";

    initMap();
    carregar();
  } else {
    alert("Login inválido");
  }
}

function logout(){
  location.reload();
}

/* MAPA */
function initMap(){
  map=L.map('map').setView([-7.12,-36.5],8);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png')
    .addTo(map);

  cluster=L.markerClusterGroup();
  map.addLayer(cluster);
}

/* MODAL */
function abrirModal(){ modal.style.display="flex"; }
function fecharModal(){ modal.style.display="none"; }

/* COR */
function cor(c){
  if(!c) return "#94a3b8";
  c=c.toUpperCase();
  if(c.includes("ALTA")) return "#ef4444";
  if(c.includes("MEDIA")) return "#facc15";
  if(c.includes("BAIXA")) return "#22c55e";
  return "#3b82f6";
}

/* CARREGAR */
async function carregar(){
  const res = await fetch("https://despacholinhaviva.pedro-fillype.workers.dev/api/dados");
  let dados = await res.json();

  cluster.clearLayers();

  dados = dados.filter(p=>{
    const lat=parseFloat(p.lat);
    const lon=parseFloat(p.lon);
    return !isNaN(lat)&&!isNaN(lon)&&lat!==0&&lon!==0;
  });

  contador.innerText="Total: "+dados.length;

  dados.forEach(p=>{
    const marker=L.circleMarker([p.lat,p.lon],{
      radius:8,
      fillColor:cor(p.criticidade),
      color:"#fff",
      weight:1,
      fillOpacity:0.9
    });

    marker.bindPopup(`<b>OS:</b> ${p.os}`);
    cluster.addLayer(marker);
  });
}

/* PROCESSAR */
async function processar(){
  const f1=file1.files[0];
  const f2=file2.files[0];

  if(!f1||!f2){ alert("Envie os arquivos"); return; }

  status.innerText="Processando...";

  const d1=XLSX.utils.sheet_to_json(XLSX.read(await f1.arrayBuffer()).Sheets.Sheet1);
  const d2=XLSX.utils.sheet_to_json(XLSX.read(await f2.arrayBuffer()).Sheets.Sheet1);

  let dados=[...d1,...d2]
    .filter(r=>r.Status==="CRIADA"||r.Status==="A REPROGRAMAR")
    .map(r=>{
      const lat=parseFloat(String(r["Latitude"]).replace(",","."));
      const lon=parseFloat(String(r["Longitude"]).replace(",","."));

      return {
        os:r["OS Manutencao"],
        lat, lon,
        criticidade:r["Criticidade"]
      };
    })
    .filter(p=>!isNaN(p.lat)&&!isNaN(p.lon)&&p.lat!==0&&p.lon!==0);

  const chunk=300;

  for(let i=0;i<dados.length;i+=chunk){
    const parte=dados.slice(i,i+chunk);

    await fetch("https://despacholinhaviva.pedro-fillype.workers.dev/salvar",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-reset": i===0?"true":"false"
      },
      body:JSON.stringify(parte)
    });

    let perc=Math.floor((i/dados.length)*100);
    bar.style.width=perc+"%";
    bar.innerText=perc+"%";
  }

  bar.style.width="100%";
  bar.innerText="100%";

  status.innerText="Concluído";

  carregar();
}
</script>

</body>
</html>
