<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Mapa de Despacho por Equipes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" crossorigin="" />

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        #topo {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            padding: 10px 12px;
            background: #ffffff;
            border-bottom: 1px solid #dcdcdc;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            position: relative;
            z-index: 1001;
        }

        #topo h2 {
            margin: 0;
            font-size: 18px;
            color: #1f1f1f;
        }

        #controls {
            padding: 10px 12px;
            display: none;
            flex-wrap: wrap;
            gap: 10px;
            align-items: flex-start;
            background: #ffffff;
            border-bottom: 1px solid #dcdcdc;
            position: relative;
            z-index: 1000;
        }

        select, button, input[type="text"], input[type="file"] {
            font-size: 15px;
            padding: 8px 10px;
            border: 1px solid #cfcfcf;
            border-radius: 8px;
            background: #fff;
        }

        button {
            cursor: pointer;
            background: #1a73e8;
            color: white;
            border: none;
            transition: 0.2s ease;
        }

        button:hover {
            background: #1666c1;
        }

        label {
            font-weight: bold;
            color: #333;
        }

        #select-equipe {
            min-width: 320px;
            max-width: 380px;
        }

        #map {
            height: calc(100vh - 132px);
            width: 100%;
        }

        #legend {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(4px);
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.18);
            font-size: 14px;
            z-index: 1000;
            min-width: 290px;
            max-width: 360px;
            display: none;
            max-height: 280px;
            overflow-y: auto;
        }

        .numero-balao div {
            background-repeat: no-repeat;
            background-position: center bottom;
        }

        .info-box {
            position: fixed;
            top: 138px;
            right: 20px;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(4px);
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.18);
            font-size: 14px;
            z-index: 1000;
            max-height: 300px;
            overflow-y: auto;
            min-width: 260px;
            display: none;
        }

        .info-box h3 {
            margin: 0 0 8px 0;
            font-size: 15px;
            color: #222;
        }

        .info-item {
            padding: 5px 0;
            border-bottom: 1px solid #eeeeee;
        }

        .legenda-equipe {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 7px;
        }

        .legenda-cor {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.25);
            display: inline-block;
            flex-shrink: 0;
        }

        .dica {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        @media (max-width: 768px) {
            #map {
                height: calc(100vh - 215px);
            }

            #legend,
            .info-box {
                left: 10px;
                right: 10px;
                min-width: auto;
                max-width: none;
            }

            .info-box {
                top: auto;
                bottom: 160px;
            }

            #select-equipe {
                min-width: 100%;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <div id="topo">
        <h2>Mapa de Despacho por Equipes</h2>
        <input type="file" id="input-excel" accept=".xlsx" />
    </div>

    <div id="controls">
        <div>
            <label for="searchEquipe">Pesquisar equipe:</label><br>
            <input type="text" id="searchEquipe" placeholder="Digite para filtrar equipes..." />
        </div>

        <div>
            <label for="select-equipe">Equipes:</label><br>
            <select id="select-equipe" size="8" multiple></select>
            <div class="dica">Segure Ctrl para selecionar várias equipes</div>
        </div>

        <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:22px;">
            <button id="btn-limpar">Limpar seleção</button>
        </div>
    </div>

    <div id="map"></div>
    <div id="legend"></div>
    <div class="info-box" id="infoEquipes"></div>

    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js" crossorigin=""></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <script>
        const input = document.getElementById('input-excel');
        const selectEquipe = document.getElementById('select-equipe');
        const btnLimpar = document.getElementById('btn-limpar');
        const controlsDiv = document.getElementById('controls');
        const legendDiv = document.getElementById('legend');
        const infoEquipes = document.getElementById('infoEquipes');
        const searchEquipe = document.getElementById('searchEquipe');

        let map, layersGroup;
        let dadosOriginais = [];

        const coresBase = [
            '#1a73e8', '#34a853', '#ea4335', '#fbbc04', '#8e24aa',
            '#00acc1', '#fb8c00', '#5e35b1', '#43a047', '#e53935',
            '#3949ab', '#00897b', '#6d4c41', '#7cb342', '#d81b60'
        ];

        function initMap(lat = -7.12, lon = -36.5, zoom = 8) {
            if (map) map.remove();

            map = L.map('map', {
                zoomControl: true
            }).setView([lat, lon], zoom);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                subdomains: 'abcd',
                maxZoom: 20,
                attribution: '&copy; OpenStreetMap &copy; CARTO'
            }).addTo(map);

            layersGroup = L.layerGroup().addTo(map);
        }

        function hashCode(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            return hash;
        }

        function getCorEquipe(nomeEquipe) {
            return coresBase[Math.abs(hashCode(nomeEquipe)) % coresBase.length];
        }

        function formatarNumero(valor) {
            const num = Number(valor);
            if (isNaN(num)) return '-';
            return num.toLocaleString('pt-BR', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        function popularSelectEquipes() {
            const contagem = {};

            dadosOriginais.forEach(r => {
                if (!contagem[r.equipe]) contagem[r.equipe] = 0;
                contagem[r.equipe]++;
            });

            const equipes = Object.keys(contagem).sort();

            selectEquipe.innerHTML = '';

            equipes.forEach(eq => {
                const opt = document.createElement('option');
                opt.value = eq;
                opt.textContent = `${eq} (${contagem[eq]})`;
                selectEquipe.appendChild(opt);
            });

            controlsDiv.style.display = 'flex';
            renderResumoEquipes(contagem);
        }

        function renderResumoEquipes(contagem) {
            const lista = Object.entries(contagem).sort((a, b) => b[1] - a[1]);

            infoEquipes.innerHTML = `
                <h3>Despachados por equipe</h3>
                ${lista.map(([equipe, qtd]) => `
                    <div class="info-item">
                        <strong>${equipe}</strong>: ${qtd}
                    </div>
                `).join('')}
            `;

            infoEquipes.style.display = 'block';
        }

        function getEquipesSelecionadas() {
            return Array.from(selectEquipe.selectedOptions).map(opt => opt.value);
        }

        function desenharMapa(equipesSelecionadas) {
            layersGroup.clearLayers();
            legendDiv.style.display = 'none';

            if (!equipesSelecionadas || equipesSelecionadas.length === 0) {
                return;
            }

            let todosLatLngs = [];
            let legendHtml = `<b>Equipes selecionadas:</b> ${equipesSelecionadas.length}<br><br>`;

            equipesSelecionadas.forEach(equipeSelecionada => {
                let dadosEquipe = dadosOriginais.filter(r =>
                    r.equipe === equipeSelecionada &&
                    !isNaN(r.lat) &&
                    !isNaN(r.lon)
                );

                if (dadosEquipe.length === 0) return;

                dadosEquipe.sort((a, b) => {
                    const livroA = Number(a.livro);
                    const livroB = Number(b.livro);

                    if (!isNaN(livroA) && !isNaN(livroB) && livroA !== livroB) {
                        return livroA - livroB;
                    }

                    return String(a.cdc).localeCompare(String(b.cdc), 'pt-BR', { numeric: true });
                });

                const corEquipe = getCorEquipe(equipeSelecionada);

                dadosEquipe.forEach((ponto, idx) => {
                    const popupContent = `
                        <b>Parada ${idx + 1}</b><br>
                        <b>Equipe:</b> ${ponto.equipe || '-'}<br>
                        <b>CDC:</b> ${ponto.cdc || '-'}<br>
                        <b>Bairro:</b> ${ponto.bairro || '-'}<br>
                        <b>Tipo:</b> ${ponto.tipo || '-'}<br>
                        <b>Regional:</b> ${ponto.regional || '-'}<br>
                        <b>Livro:</b> ${ponto.livro || '-'}<br>
                        <b>Rota:</b> ${ponto.livro_local_rota || '-'}<br>
                        <b>Valor esperado:</b> R$ ${formatarNumero(ponto.valor_esperado)}<br>
                        <b>Valor total devido:</b> R$ ${formatarNumero(ponto.valor_total_devido)}<br>
                        <b>Rural/Urbano:</b> ${ponto.rural_urban || '-'}
                    `;

                    L.circleMarker([ponto.lat, ponto.lon], {
                        radius: 7,
                        fillColor: corEquipe,
                        color: '#ffffff',
                        weight: 2,
                        opacity: 1,
                        fillOpacity: 0.95
                    }).bindPopup(popupContent).addTo(layersGroup);

                    L.marker([ponto.lat + 0.00015, ponto.lon], {
                        icon: L.divIcon({
                            className: 'numero-balao',
                            html: `<div style="
                                font-size: 10pt;
                                font-weight: bold;
                                color: white;
                                background: ${corEquipe};
                                border-radius: 50%;
                                width: 22px;
                                height: 22px;
                                line-height: 22px;
                                text-align: center;
                                border: 2px solid white;
                                box-shadow: 0 1px 4px rgba(0,0,0,0.35);">
                                ${idx + 1}
                            </div>`
                        }),
                        interactive: false
                    }).addTo(layersGroup);

                    todosLatLngs.push([ponto.lat, ponto.lon]);
                });

                legendHtml += `
                    <div class="legenda-equipe">
                        <span class="legenda-cor" style="background:${corEquipe};"></span>
                        <span><b>${equipeSelecionada}</b> — ${dadosEquipe.length} pontos</span>
                    </div>
                `;
            });

            if (todosLatLngs.length > 0) {
                const bounds = L.latLngBounds(todosLatLngs);
                map.fitBounds(bounds, { padding: [30, 30] });
                legendDiv.innerHTML = legendHtml;
                legendDiv.style.display = 'block';
            }
        }

        searchEquipe.addEventListener('input', () => {
            const filtro = searchEquipe.value.toLowerCase();

            for (let option of selectEquipe.options) {
                const texto = option.text.toLowerCase();
                option.style.display = texto.includes(filtro) ? 'block' : 'none';
            }
        });

        input.addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();

            reader.onload = evt => {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: '' });

                dadosOriginais = jsonData
                    .map(r => ({
                        equipe: String(r['NOME_EQUIPE'] || '').trim(),
                        cdc: String(r['NUMCDC_VINCULADO'] || '').trim(),
                        bairro: String(r['BAIRRO'] || '').trim(),
                        tipo: String(r['TIPO'] || '').trim(),
                        regional: String(r['REGIONAL'] || '').trim(),
                        livro_local_rota: String(r['Livro_local_rota'] || '').trim(),
                        livro: r['LIVRO'],
                        lat: parseFloat(r['LAT']),
                        lon: parseFloat(r['LONG']),
                        valor_esperado: r['valor_esperado'],
                        valor_total_devido: r['valor_total_devido'],
                        rural_urban: String(r['RURAL_OR_URBAN'] || '').trim()
                    }))
                    .filter(r =>
                        r.equipe !== '' &&
                        !isNaN(r.lat) &&
                        !isNaN(r.lon)
                    );

                if (dadosOriginais.length === 0) {
                    alert('Nenhum dado válido foi encontrado no Excel.');
                    return;
                }

                popularSelectEquipes();
                layersGroup.clearLayers();
                legendDiv.style.display = 'none';
                searchEquipe.value = '';

                const bounds = L.latLngBounds(
                    dadosOriginais.map(r => [r.lat, r.lon])
                );
                map.fitBounds(bounds, { padding: [30, 30] });
            };

            reader.readAsArrayBuffer(file);
        });

        selectEquipe.addEventListener('change', () => {
            desenharMapa(getEquipesSelecionadas());
        });

        btnLimpar.addEventListener('click', () => {
            Array.from(selectEquipe.options).forEach(opt => opt.selected = false);
            searchEquipe.value = '';
            layersGroup.clearLayers();
            legendDiv.style.display = 'none';

            for (let option of selectEquipe.options) {
                option.style.display = 'block';
            }

            if (dadosOriginais.length > 0) {
                const bounds = L.latLngBounds(
                    dadosOriginais.map(r => [r.lat, r.lon])
                );
                map.fitBounds(bounds, { padding: [30, 30] });
            }
        });

        initMap();
    </script>
</body>
</html>
