<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Despacho LL PRO</title>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>
  

<style>
body { margin:0; font-family:Arial; background:#0b1220; color:white; }

/* LOGIN */
#login {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.card {
  background:#1e293b;
  padding:30px;
  border-radius:12px;
  width:300px;
}

/* APP */
#app { display:none; }

/* HEADER */
#header {
  height:50px;
  background:#020617;
  display:flex;
  align-items:center;
  padding:0 20px;
  font-weight:bold;
  justify-content:space-between;
}

/* LAYOUT */
#layout {
  display:flex;
  height:calc(100vh - 50px);
}

/* SIDEBAR */
#sidebar {
  width:300px;
  background:#020617;
  padding:20px;
  overflow:auto;
  transition:0.3s;
}

#sidebar.hidden {
  display:none;
}

/* MAP */
#map { flex:1; }

/* INPUT */
input, select, button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:none;
  background:#1e293b;
  color:white;
}

button { background:#22c55e; cursor:pointer; }
.logout { background:#ef4444; margin-top:20px; }

.label { margin-top:10px; font-size:12px; color:#94a3b8; }

/* PROGRESS */
#progress { margin-top:10px; background:#111827; border-radius:8px; }
#bar {
  height:20px;
  width:0%;
  background:#22c55e;
  text-align:center;
  font-size:12px;
}

/* LEGENDA */
.legend-box {
  background:#020617;
  padding:10px;
  border-radius:8px;
  max-height:200px;
  overflow:auto;
  font-size:12px;
}
</style>

</head>

<body>

<!-- LOGIN -->

<div id="login">
  <div class="card">
    <h3>🔐 Login</h3>
    <input id="user" placeholder="Usuário">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->

<div id="app">

<div id="header">
  <div>📍 Despacho LL</div>

  <div style="display:flex; gap:10px;">
    <button onclick="toggleMenu()">☰ Menu</button>
    <button onclick="toggleLegenda()">📊 Legenda</button>
  </div>
</div>

<div id="layout">

<div id="sidebar">

<h3>📁 Upload</h3>
<input type="file" id="file">
<button onclick="enviar()">Enviar</button>

<div id="progress"><div id="bar">0%</div></div>
<div id="status"></div>

<hr>

<h3>📊 Filtros</h3>

<div class="label">Buscar OS</div>
<input id="busca" placeholder="Digite a OS..." oninput="carregar()">

<div class="label">Criticidade</div>
<select id="crit" onchange="carregar()">
  <option value="">Todas</option>
  <option value="ALTA">Alta</option>
  <option value="MEDIA">Média</option>
  <option value="BAIXA">Baixa</option>
</select>

<div class="label">Tipo de Serviço</div>
<select id="tipo" onchange="carregar()"></select>

<div class="label">Trecho</div>
<select id="trecho" onchange="carregar()"></select>

<div class="label">Alimentador</div>
<select id="alim" onchange="carregar()"></select>

  <hr>
<h3>📋 OS Selecionadas</h3>
<div id="listaOS" style="max-height:200px; overflow:auto; font-size:12px;"></div>


<div id="contador"></div>

<button class="logout" onclick="logout()">Sair</button>

</div>
<div id="map"></div>

</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
let drawnItems; // 🔥 NOVO
let map, cluster;
let coresTipo = {};
let legendaControl = null;
let legendaVisivel = false;

const paleta = ["#3b82f6","#22c55e","#facc15","#ef4444","#a855f7","#06b6d4","#f97316"];

  function mostrarListaOS(markers){

  const div = document.getElementById("listaOS");

  if(!markers.length){
    div.innerHTML = "Nenhuma OS encontrada";
    return;
  }

  let html = "";

  markers.forEach(m => {
    const p = m.options.dados;

    html += `
      <div style="
        background:#1e293b;
        padding:8px;
        border-radius:6px;
        margin-top:6px;
        cursor:pointer;
      ">
        <b>${p.os}</b><br>
        ${p.tipo}<br>
        ${p.alimentador || "-"}
      </div>
    `;
  });

  div.innerHTML = html;
}

/* LOGIN */
function login(){
  if(user.value==="admin" && senha.value==="123456"){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    init();
    carregar();
  } else alert("Login inválido");
}

function logout(){ location.reload(); }

/* MENU */
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("hidden");
}

/* LEGENDA */
function toggleLegenda(){
  if(legendaVisivel){
    if(legendaControl) map.removeControl(legendaControl);
    legendaVisivel = false;
  } else {
    atualizarLegenda();
    legendaVisivel = true;
  }
}

/* MAP */
function init(){
  map = L.map('map').setView([-7.12,-36.5],7);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png')
    .addTo(map);

  cluster = L.markerClusterGroup({
    maxClusterRadius: 100,
    disableClusteringAtZoom: 20,
    spiderfyOnMaxZoom: true,
    spiderLegPolylineOptions: {
    weight: 1.5,
    color: "#94a3b8",
    opacity: 0.7
  },
    // 🔥 ISSO MUDA O FORMATO
  spiderfyDistanceMultiplier: 3, // mais aberto
    showCoverageOnHover: false,
    zoomToBoundsOnClick: true,
    chunkedLoading: true,

    iconCreateFunction: function (cluster) {
      const count = cluster.getChildCount();

      let size = 40;
      if (count > 50) size = 50;
      if (count > 100) size = 60;

      return L.divIcon({
        html: `<div style="
          background:#1e293b;
          color:white;
          border-radius:50%;
          width:${size}px;
          height:${size}px;
          display:flex;
          align-items:center;
          justify-content:center;
          font-weight:bold;
          border:2px solid #22c55e;
        ">${count}</div>`,
        className: "",
        iconSize: [size, size]
      });
    }
  });

  // 🔥 ===== NOVO: DESENHO =====
  drawnItems = new L.FeatureGroup();
  map.addLayer(drawnItems);

  const drawControl = new L.Control.Draw({
    draw: {
      polygon: true,
      rectangle: true,
      circle: false,
      marker: false,
      polyline: false
    },
    edit: {
      featureGroup: drawnItems
    }
  });

  map.addControl(drawControl);

  // 🔥 CAPTURA DA ÁREA
  map.on(L.Draw.Event.CREATED, function (e) {

    drawnItems.clearLayers();
    drawnItems.addLayer(e.layer);

    const selecionados = [];

    cluster.eachLayer(m => {
      const latlng = m.getLatLng();

      if (e.layer.getBounds().contains(latlng)) {
        selecionados.push(m.options.dados);
      }
    });

    gerarSGM(selecionados);
  });

  map.addLayer(cluster);
  cluster.on('spiderfied', function (e) {
  console.log("Expandido:", e.cluster.getAllChildMarkers().length);
  });
  cluster.on('clusterclick', function (a) {

  const markers = a.layer.getAllChildMarkers();

  mostrarListaOS(markers);

});
}

/* 🔥 NOVO: GERAR SGM */
/* 🔥 NOVO: GERAR SGM */
function gerarSGM(lista){

  if(!lista.length){
    alert("Nenhum ponto selecionado");
    return;
  }

  const sgms = lista
    .map(p => p.sgm)
    .filter(Boolean);

  const texto = sgms.join(", ");

  // mostra no painel
  document.getElementById("listaOS").innerText = texto;

  // copia automaticamente
  navigator.clipboard.writeText(texto);

  alert("SGMs copiados!");
}
  
/* COR */
function corTipo(tipo){
  if(!tipo) return "#94a3b8";
  if(!coresTipo[tipo]){
    coresTipo[tipo] = paleta[Object.keys(coresTipo).length % paleta.length];
  }
  return coresTipo[tipo];
}

/* LEGENDA */
function atualizarLegenda(){

  if (legendaControl) map.removeControl(legendaControl);

  legendaControl = L.control({position:"bottomright"});

  legendaControl.onAdd = function(){
    const div = L.DomUtil.create("div","legend-box");

    let html="<b>Tipos</b><br>";

    Object.entries(coresTipo).forEach(([t,c])=>{
      html+=`
        <div style="margin-top:4px;">
          <span style="background:${c};width:10px;height:10px;display:inline-block;margin-right:6px"></span>
          ${t}
        </div>`;
    });

    div.innerHTML=html;
    return div;
  };

  legendaControl.addTo(map);
}

/* UPLOAD */
function enviar(){
  const file = document.getElementById("file").files[0];
  if(!file) return alert("Selecione arquivo");

  const reader = new FileReader();

  reader.onload = e=>{
    const wb = XLSX.read(new Uint8Array(e.target.result),{type:"array"});
    const csv = XLSX.utils.sheet_to_csv(wb.Sheets[wb.SheetNames[0]]);

    const xhr = new XMLHttpRequest();
    xhr.open("POST","https://despacholinhaviva.pedro-fillype.workers.dev/upload");

    xhr.upload.onprogress = e=>{
      if(e.lengthComputable){
        const p = Math.round((e.loaded/e.total)*100);
        bar.style.width=p+"%";
        bar.innerText=p+"%";
      }
    };

    xhr.onload=()=>{ status.innerText="Upload OK"; carregar(); };
    xhr.send(csv);
  };

  reader.readAsArrayBuffer(file);
}

/* FILTROS */
function preencher(id,set){
  const el=document.getElementById(id);
  el.innerHTML='<option value="">Todos</option>';
  [...set].sort().forEach(v=> el.innerHTML+=`<option>${v}</option>`);
}

/* CARREGAR */
async function carregar(){

  const res = await fetch("https://despacholinhaviva.pedro-fillype.workers.dev/api/dados");
  let dados = await res.json();

  const busca = document.getElementById("busca").value.toUpperCase();
  const crit = document.getElementById("crit").value;
  const tipo = document.getElementById("tipo").value;
  const trecho = document.getElementById("trecho").value;
  const alim = document.getElementById("alim").value;

  const setTipo=new Set(), setTrecho=new Set(), setAlim=new Set();

  dados.forEach(p=>{
    if(p.tipo) setTipo.add(p.tipo);
    if(p.trecho) setTrecho.add(p.trecho);
    if(p.alimentador) setAlim.add(p.alimentador);
  });

  preencher("tipo",setTipo);
  preencher("trecho",setTrecho);
  preencher("alim",setAlim);

  coresTipo = {};
  cluster.clearLayers();

  let bounds = [];

  dados = dados.filter(p=>{
    if(busca && !p.os?.toUpperCase().includes(busca)) return false;
    if(crit && !p.criticidade?.includes(crit)) return false;
    if(tipo && p.tipo!==tipo) return false;
    if(trecho && p.trecho!==trecho) return false;
    if(alim && p.alimentador!==alim) return false;
    return true;
  });

  contador.innerText="Total: "+dados.length;

  dados.forEach(p => {

  const lat = parseFloat(p.lat);
  const lon = parseFloat(p.lon);

  if(isNaN(lat) || isNaN(lon)) return;

  const marker = L.marker([lat,lon], {
  icon: L.divIcon({
    html:`<div style="
      width:14px;
      height:14px;
      background:${corTipo(p.tipo)};
      border-radius:50%;
      border:3px solid white;
    "></div>`
  }),
  dados: p
});

marker.bindPopup(`
  <b>OS:</b> ${p.os}<br>
  <b>Status:</b> ${p.status}<br>
  <b>Tipo:</b> ${p.tipo}<br>
  <b>Trecho:</b> ${p.trecho}<br>
  <b>Alimentador:</b> ${p.alimentador}<br>
  <b>Criticidade:</b> ${p.criticidade}<br>
  <b>Tag:</b> ${p.tag}
`);
  // ✅ AQUI É O LUGAR CERTO
  marker.on('click', function () {

    const clickedLat = this.getLatLng().lat;
    const clickedLon = this.getLatLng().lng;

    const iguais = [];

    cluster.eachLayer(m => {
      const lat = m.getLatLng().lat;
      const lon = m.getLatLng().lng;

      if(Math.abs(lat - clickedLat) < 0.00001 &&
         Math.abs(lon - clickedLon) < 0.00001){
        iguais.push(m);
      }
    });

    mostrarListaOS(iguais);
  });

  cluster.addLayer(marker);
});

  if(bounds.length){
    map.fitBounds(bounds);
  }

  if(legendaVisivel){
    atualizarLegenda();
  }
}
</script>

</body>
</html>
