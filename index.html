<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema de Despacho</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* LOGIN */
#login {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  background: #1e293b;
  padding: 30px;
  border-radius: 12px;
  width: 300px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  margin-top: 15px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #22c55e;
  color: white;
  cursor: pointer;
}

/* APP */
#app {
  display: none;
}

#topo {
  padding: 10px;
  background: #1e293b;
}

#map {
  height: calc(100vh - 140px);
}

#admin {
  padding: 10px;
  background: #020617;
}
</style>

</head>

<body>

<!-- LOGIN -->

<div id="login">
  <div class="card">
    <h3>Login</h3>
    <input id="user" placeholder="Usuário">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->

<div id="app">

  <div id="topo">
    <h3>Sistema de Despacho</h3>
  </div>

  <!-- ADMIN -->

  <div id="admin">
    <input type="file" id="file1">
    <input type="file" id="file2">
    <button onclick="enviarArquivos()">Processar</button>
  </div>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<script>
let map, layer;

/* LOGIN */
function login() {
  const user = document.getElementById("user").value;
  const senha = document.getElementById("senha").value;

  if (user === "admin" && senha === "123456") {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

    initMap();
    carregarDados();
  } else {
    alert("Login inválido");
  }
}

/* MAPA */
function initMap() {
  map = L.map('map').setView([-7.12, -36.5], 8);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png')
    .addTo(map);

  layer = L.layerGroup().addTo(map);
}

/* CARREGAR DADOS */
async function carregarDados() {
  const res = await fetch("https://despacholinhaviva.pedro-fillype.workers.dev/api/dados");
  const dados = await res.json();

  layer.clearLayers();

  dados.forEach(p => {
    if (!p.lat || !p.lon) return;

    const m = L.circleMarker([p.lat, p.lon], {
      radius: 8,
      color: "#22c55e"
    });

    m.bindPopup(`
      OS: ${p.os}<br>
      Status: ${p.status}<br>
      Base: ${p.base}
    `);

    m.addTo(layer);
  });
}

/* UPLOAD */
async function enviarArquivos() {
  const f1 = document.getElementById("file1").files[0];
  const f2 = document.getElementById("file2").files[0];

  if (!f1 || !f2) {
    alert("Envie os dois arquivos");
    return;
  }

  const form = new FormData();
  form.append("file1", f1);
  form.append("file2", f2);

  await fetch("https://despacholl-production.up.railway.app/upload", {
    method: "POST",
    body: form
  });

  alert("Processado!");

  carregarDados();
}
</script>

</body>
</html>
