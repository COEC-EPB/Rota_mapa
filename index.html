<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Despacho LL</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>
body { margin:0; font-family:Arial; background:#0b1220; color:white; }

/* HEADER */
#header {
  height:50px;
  background:#020617;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}

/* LAYOUT */
#layout {
  display:flex;
  height:calc(100vh - 50px);
}

/* SIDEBAR */
#sidebar {
  width:300px;
  background:#020617;
  padding:20px;
  transition:0.3s;
  overflow:auto;
}

#sidebar.collapsed {
  width:60px;
  padding:10px;
}

/* BOTÃO TOGGLE */
#toggle {
  background:#1e293b;
  border:none;
  padding:8px;
  cursor:pointer;
  width:100%;
  margin-bottom:10px;
}

/* MAP */
#map { flex:1; }

/* INPUT */
input, select, button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  background:#1e293b;
  color:white;
}

button {
  background:#22c55e;
  cursor:pointer;
}

.logout {
  background:#ef4444;
  margin-top:20px;
}

/* PROGRESS */
#progress {
  margin-top:10px;
  background:#111827;
  border-radius:8px;
}

#bar {
  height:20px;
  width:0%;
  background:#22c55e;
  text-align:center;
  font-size:12px;
}

/* STATUS */
#status { margin-top:10px; }

.label { margin-top:10px; font-size:12px; color:#94a3b8; }
</style>

</head>

<body>

<div id="header">
  <div>📍 Despacho LL</div>
</div>

<div id="layout">

<div id="sidebar">

<button id="toggle" onclick="toggleSidebar()">☰</button>

<h3>📁 Upload</h3>
<input type="file" id="file">
<button onclick="enviar()">Enviar</button>

<div id="progress"><div id="bar">0%</div></div>
<div id="status"></div>

<hr>

<h3>📊 Filtros</h3>

<input id="busca" placeholder="Buscar OS..." oninput="carregar()">

<div class="label">Criticidade</div>
<select id="crit" onchange="carregar()">
  <option value="">Todos</option>
  <option value="ALTA">Alta</option>
  <option value="MEDIA">Média</option>
  <option value="BAIXA">Baixa</option>
</select>

<div class="label">Tipo Serviço</div>
<select id="tipo" onchange="carregar()"></select>

<div class="label">Trecho</div>
<select id="trecho" onchange="carregar()"></select>

<div class="label">Alimentador</div>
<select id="alim" onchange="carregar()"></select>

<div id="contador"></div>

<button class="logout" onclick="logout()">Sair</button>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
let map, cluster;
let dadosGlobais = [];

/* SIDEBAR */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("collapsed");
}

/* MAPA */
function init(){
  map = L.map('map').setView([-7.12,-36.5],8);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png')
    .addTo(map);

  cluster = L.markerClusterGroup();
  map.addLayer(cluster);
}

/* CORES */
function cor(c){
  if(!c) return "#94a3b8";
  c = c.toUpperCase();
  if(c.includes("ALTA")) return "#ef4444";
  if(c.includes("MEDIA")) return "#facc15";
  if(c.includes("BAIXA")) return "#22c55e";
  return "#3b82f6";
}

/* UPLOAD */
async function enviar(){
  const file = fileInput.files[0];
  const bar = document.getElementById("bar");
  const status = document.getElementById("status");

  if(!file) return alert("Selecione arquivo");

  const reader = new FileReader();

  reader.onload = async (e)=>{
    const data = new Uint8Array(e.target.result);
    const wb = XLSX.read(data,{type:"array"});
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const csv = XLSX.utils.sheet_to_csv(sheet);

    const xhr = new XMLHttpRequest();
    xhr.open("POST","https://despacholinhaviva.pedro-fillype.workers.dev/upload");

    xhr.upload.onprogress = (e)=>{
      if(e.lengthComputable){
        const p = Math.round((e.loaded/e.total)*100);
        bar.style.width = p+"%";
        bar.innerText = p+"%";
      }
    };

    xhr.onload = ()=>{
      status.innerText = "✅ Upload concluído";
      carregar();
    };

    xhr.send(csv);
  };

  reader.readAsArrayBuffer(file);
}

/* FILTROS DINÂMICOS */
function popularFiltros(dados){
  const setTipo = new Set();
  const setTrecho = new Set();
  const setAlim = new Set();

  dados.forEach(p=>{
    if(p.tipo) setTipo.add(p.tipo);
    if(p.trecho) setTrecho.add(p.trecho);
    if(p.alimentador) setAlim.add(p.alimentador);
  });

  preencherSelect("tipo", setTipo);
  preencherSelect("trecho", setTrecho);
  preencherSelect("alim", setAlim);
}

function preencherSelect(id, set){
  const sel = document.getElementById(id);
  sel.innerHTML = '<option value="">Todos</option>';
  [...set].sort().forEach(v=>{
    sel.innerHTML += `<option value="${v}">${v}</option>`;
  });
}

/* CARREGAR */
async function carregar(){
  const res = await fetch("https://despacholinhaviva.pedro-fillype.workers.dev/api/dados");
  let dados = await res.json();

  dadosGlobais = dados;

  popularFiltros(dados);

  const busca = buscaOS.value.toUpperCase();
  const crit = critSelect.value;
  const tipo = tipoSelect.value;
  const trecho = trechoSelect.value;
  const alim = alimSelect.value;

  cluster.clearLayers();

  dados = dados.filter(p=>{
    if(busca && !p.os?.toUpperCase().includes(busca)) return false;
    if(crit && !p.criticidade?.includes(crit)) return false;
    if(tipo && p.tipo !== tipo) return false;
    if(trecho && p.trecho !== trecho) return false;
    if(alim && p.alimentador !== alim) return false;
    return true;
  });

  contador.innerText = "Total: " + dados.length;

  dados.forEach(p=>{
    const marker = L.circleMarker([p.lat,p.lon],{
      radius:8,
      fillColor:cor(p.criticidade),
      color:"#fff",
      fillOpacity:0.9
    });

    marker.bindPopup(`
      <b>OS:</b> ${p.os}<br>
      <b>Status:</b> ${p.status}<br>
      <b>Tipo:</b> ${p.tipo}<br>
      <b>Trecho:</b> ${p.trecho}<br>
      <b>Alimentador:</b> ${p.alimentador}
    `);

    cluster.addLayer(marker);
  });
}

/* LOGOUT */
function logout(){
  location.reload();
}

/* INIT */
init();
carregar();
</script>

</body>
</html>
