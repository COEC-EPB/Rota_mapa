<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Despacho LL</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0b1220; color:white; }

#layout { display:flex; height:100vh; }

#filtros {
  width:280px;
  background:#020617;
  padding:20px;
  border-right:1px solid #1e293b;
}

#map { flex:1; }

input, select, button {
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:8px;
  border:none;
  background:#1e293b;
  color:white;
}

button { background:#22c55e; font-weight:bold; cursor:pointer; }

#contador { margin-top:10px; color:#94a3b8; }
</style>

</head>

<body>

<div id="layout">

<div id="filtros">

<h3>📊 Filtros</h3>

<input id="buscaOS" placeholder="🔍 Buscar OS..." oninput="carregar()">

<label>Tipo</label> <select id="filtroTipo" onchange="carregar()">

  <option value="">Todos</option>
  <option value="PREVENTIVA">Preventiva</option>
  <option value="CORRETIVA">Corretiva</option>
  <option value="INSPECAO">Inspeção</option>
</select>

<label>Criticidade</label> <select id="filtroCriticidade" onchange="carregar()">

  <option value="">Todos</option>
  <option value="ALTA">Alta</option>
  <option value="MEDIA">Média</option>
  <option value="BAIXA">Baixa</option>
</select>

<div id="contador"></div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>
let map, clusterGroup;

function initMap() {
  map = L.map('map').setView([-7.12, -36.5], 8);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png')
    .addTo(map);

  clusterGroup = L.markerClusterGroup();
  map.addLayer(clusterGroup);
}

function corPorCriticidade(c) {
  if (!c) return "#94a3b8";

  c = c.toUpperCase();

  if (c.includes("ALTA")) return "#ef4444";
  if (c.includes("MEDIA")) return "#facc15";
  if (c.includes("BAIXA")) return "#22c55e";

  return "#3b82f6";
}

async function carregar() {
  const tipo = filtroTipo.value;
  const crit = filtroCriticidade.value;
  const busca = buscaOS.value.toUpperCase();

  const res = await fetch("https://despacholinhaviva.pedro-fillype.workers.dev/api/dados");
  let dados = await res.json();

  clusterGroup.clearLayers();

  dados = dados.filter(p => {
    if (tipo && !p.tipo?.toUpperCase().includes(tipo)) return false;
    if (crit && !p.criticidade?.toUpperCase().includes(crit)) return false;
    if (busca && !p.os?.toUpperCase().includes(busca)) return false;
    return true;
  });

  document.getElementById("contador").innerText =
    "Total: " + dados.length + " registros";

  const bounds = [];

  dados.forEach(p => {
    if (isNaN(p.lat) || isNaN(p.lon)) return;

    bounds.push([p.lat, p.lon]);

    const marker = L.circleMarker([p.lat, p.lon], {
      radius: 8,
      fillColor: corPorCriticidade(p.criticidade),
      color: "#fff",
      weight: 1,
      fillOpacity: 0.9
    });

    marker.bindPopup(`
      <b>OS:</b> ${p.os}<br>
      <b>Status:</b> ${p.status}<br>
      <b>Data:</b> ${p.data_criacao || "-"}<br>
      <b>Alimentador:</b> ${p.alimentador || "-"}<br>
      <b>Tipo:</b> ${p.tipo || "-"}<br>
      <b>Tag:</b> ${p.tag || "-"}<br>
      <b>Criticidade:</b> ${p.criticidade || "-"}
    `);

    clusterGroup.addLayer(marker);
  });

  if (bounds.length) map.fitBounds(bounds);
}

initMap();
carregar();
</script>

</body>
</html>
