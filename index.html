<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Despacho LL</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }

#login {
  height:100vh; display:flex; justify-content:center; align-items:center;
}

.card {
  background:#1e293b; padding:30px; border-radius:12px; width:300px;
}

input, button {
  width:100%; margin-top:10px; padding:10px; border-radius:8px; border:none;
}

button { background:#22c55e; color:white; cursor:pointer; }

#app { display:none; }

#admin {
  padding:10px;
  background:#020617;
}

#status {
  margin-top:10px;
  padding:8px;
  border-radius:6px;
}

.processando { background:#facc15; color:black; }
.sucesso { background:#22c55e; }
.erro { background:#ef4444; }

#map { height:calc(100vh - 160px); }
</style>

</head>

<body>

<!-- LOGIN -->

<div id="login">
  <div class="card">
    <h3>Login</h3>
    <input id="user" placeholder="Usuário">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->

<div id="app">

  <div id="admin">
    <input type="file" id="file1">
    <input type="file" id="file2">
    <button onclick="processar()">Processar</button>
    <div id="status"></div>
  </div>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<script>
let map, layer;

/* LOGIN */
function login() {
  const user = document.getElementById("user").value;
  const senha = document.getElementById("senha").value;

  if (user === "admin" && senha === "123456") {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

    initMap();
    carregar();
  } else {
    alert("Login inválido");
  }
}

/* MAPA */
function initMap() {
  map = L.map('map').setView([-7.12, -36.5], 8);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png')
    .addTo(map);

  layer = L.layerGroup().addTo(map);
}

/* CARREGAR DADOS */
async function carregar() {
  const res = await fetch("https://despacholinhaviva.pedro-fillype.workers.dev/api/dados");
  const dados = await res.json();

  layer.clearLayers();

  dados.forEach(p => {
    if (!p.lat || !p.lon) return;

    L.circleMarker([p.lat, p.lon], { radius: 8, color:"#22c55e" })
      .bindPopup(`OS: ${p.os}<br>Status: ${p.status}`)
      .addTo(layer);
  });
}

/* PROCESSAR EXCEL */
async function processar() {
  const f1 = file1.files[0];
  const f2 = file2.files[0];
  const status = document.getElementById("status");

  if (!f1 || !f2) {
    alert("Envie os dois arquivos");
    return;
  }

  status.innerText = "⏳ Processando...";
  status.className = "processando";

  try {
    const data1 = XLSX.utils.sheet_to_json(
      XLSX.read(await f1.arrayBuffer()).Sheets.Sheet1
    );

    const data2 = XLSX.utils.sheet_to_json(
      XLSX.read(await f2.arrayBuffer()).Sheets.Sheet1
    );

    let dados = [...data1, ...data2];

    dados = dados
      .filter(r => r.Status === "CRIADA" || r.Status === "A REPROGRAMAR")
      .map(r => ({
        os: r["OS Manutencao"],
        status: r["Status"],
        data_criacao: r["Data Criacao"],
        base: r["Base Operacao"],
        qtd_clientes: r["Qtd Clientes Cadastrados"],
        alimentador: r["Nome do Alimentador"],
        lat: parseFloat(String(r["Latitude"]).replace(",", ".")),
        lon: parseFloat(String(r["Longitude"]).replace(",", ".")),
        trecho: r["Trecho"],
        tag: r["Tag Ativo"],
        criticidade: r["Criticidade"],
        tipo: r["Tipo Manutencao"]
      }));

    const res = await fetch("https://despacholinhaviva.pedro-fillype.workers.dev/salvar", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify(dados)
  });
  
  const text = await res.text();
  console.log("RESPOSTA:", text);
  
  if (!res.ok) {
    throw new Error("Erro ao salvar: " + text);
  }

    status.innerText = "✅ Processamento completo";
    status.className = "sucesso";

    carregar();

  } catch (e) {
    console.error(e);
    status.innerText = "❌ Erro no processamento";
    status.className = "erro";
  }
}
</script>

</body>
</html>
