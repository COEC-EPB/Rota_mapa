<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Despacho LL</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0b1220; color:white; }

/* LOGIN */
#login {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card {
  background:#1e293b;
  padding:30px;
  border-radius:12px;
  width:300px;
}

/* APP */
#app { display:none; }

/* HEADER */
#header {
  height:50px;
  background:#020617;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}

/* LAYOUT */
#layout {
  display:flex;
  height:calc(100vh - 50px);
}

/* SIDEBAR */
#sidebar {
  width:300px;
  background:#020617;
  padding:20px;
}

/* MAP */
#map { flex:1; }

/* INPUT */
input, select, button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  background:#1e293b;
  color:white;
}

button {
  background:#22c55e;
  cursor:pointer;
}

.logout {
  background:#ef4444;
  width:120px;
}

/* PROGRESS */
#progress {
  margin-top:10px;
  background:#111827;
  border-radius:8px;
  overflow:hidden;
}

#bar {
  height:20px;
  width:0%;
  background:#22c55e;
  text-align:center;
  font-size:12px;
}

/* STATUS */
#status { margin-top:10px; }
</style>

</head>

<body>

<!-- LOGIN -->

<div id="login">
  <div class="card">
    <h3>🔐 Login</h3>
    <input id="user" placeholder="Usuário">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="loginSistema()">Entrar</button>
  </div>
</div>

<!-- APP -->

<div id="app">

<div id="header">
  <div>📍 Despacho LL</div>
  <button class="logout" onclick="logout()">Sair</button>
</div>

<div id="layout">

<div id="sidebar">

  <h3>📁 Upload</h3>
  <input type="file" id="file">
  <button onclick="enviar()">Enviar</button>

  <div id="progress">
    <div id="bar">0%</div>
  </div>

  <div id="status"></div>

  <hr>

  <h3>📊 Filtros</h3>
  <input id="busca" placeholder="Buscar OS..." oninput="carregar()">

  <select id="crit" onchange="carregar()">
    <option value="">Criticidade</option>
    <option value="ALTA">Alta</option>
    <option value="MEDIA">Média</option>
    <option value="BAIXA">Baixa</option>
  </select>

  <div id="contador"></div>

</div>

<div id="map"></div>

</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>
let map, cluster;

/* LOGIN */
function loginSistema(){
  const user = document.getElementById("user").value;
  const senha = document.getElementById("senha").value;

  if(user === "admin" && senha === "123456"){
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

    init();
    carregar();
  } else {
    alert("Login inválido");
  }
}

function logout(){
  location.reload();
}

/* MAPA */
function init(){
  map = L.map('map').setView([-7.12,-36.5],8);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png')
    .addTo(map);

  cluster = L.markerClusterGroup();
  map.addLayer(cluster);
}

/* CORES */
function cor(c){
  if(!c) return "#94a3b8";
  c = c.toUpperCase();
  if(c.includes("ALTA")) return "#ef4444";
  if(c.includes("MEDIA")) return "#facc15";
  if(c.includes("BAIXA")) return "#22c55e";
  return "#3b82f6";
}

/* UPLOAD COM PROGRESSO REAL */
async function enviar() {
  const file = document.getElementById("file").files[0];
  const status = document.getElementById("status");
  const bar = document.getElementById("bar");

  if (!file) {
    alert("Selecione o Excel");
    return;
  }

  status.innerText = "⏳ Processando Excel...";
  bar.style.width = "10%";

  const reader = new FileReader();

  reader.onload = async function(e) {
    const data = new Uint8Array(e.target.result);

    const workbook = XLSX.read(data, { type: "array" });

    const sheet = workbook.Sheets[workbook.SheetNames[0]];

    // 🔥 converte pra CSV
    const csv = XLSX.utils.sheet_to_csv(sheet);

    bar.style.width = "50%";
    bar.innerText = "50%";

    // 🔥 envia CSV pro Worker
    const xhr = new XMLHttpRequest();

    xhr.open("POST", "https://despacholinhaviva.pedro-fillype.workers.dev/upload");

    xhr.upload.onprogress = function (e) {
      if (e.lengthComputable) {
        const percent = Math.round((e.loaded / e.total) * 100);
        bar.style.width = percent + "%";
        bar.innerText = percent + "%";
      }
    };

    xhr.onload = function () {
      if (xhr.status === 200) {
        const res = JSON.parse(xhr.responseText);

        bar.style.width = "100%";
        bar.innerText = "100%";

        status.innerText = "✅ " + res.total + " registros";

        carregar();
      } else {
        status.innerText = "❌ Erro no upload";
      }
    };

    xhr.onerror = function () {
      status.innerText = "❌ Falha na conexão";
    };

    xhr.send(csv);
  };

  reader.readAsArrayBuffer(file);
}

/* MAPA */
async function carregar(){
  const res = await fetch("https://despacholinhaviva.pedro-fillype.workers.dev/api/dados");
  let dados = await res.json();

  const busca = document.getElementById("busca").value.toUpperCase();
  const crit = document.getElementById("crit").value;

  cluster.clearLayers();

  dados = dados.filter(p=>{
    if(busca && !p.os?.toUpperCase().includes(busca)) return false;
    if(crit && !p.criticidade?.toUpperCase().includes(crit)) return false;
    return true;
  });

  document.getElementById("contador").innerText =
    "Total: " + dados.length;

  dados.forEach(p=>{
    const marker = L.circleMarker([p.lat,p.lon],{
      radius:8,
      fillColor:cor(p.criticidade),
      color:"#fff",
      fillOpacity:0.9
    });

    marker.bindPopup(`
      <b>OS:</b> ${p.os}<br>
      <b>Status:</b> ${p.status}<br>
      <b>Tipo:</b> ${p.tipo}<br>
      <b>Criticidade:</b> ${p.criticidade}
    `);

    cluster.addLayer(marker);
  });
}
</script>

</body>
</html>
